version: '3.8'

services:
  # Development environment
  aide-portal-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_MODE=development
    command: yarn dev --host 0.0.0.0

  # Production environment
  aide-portal-prod:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: production
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - VITE_MODE=production 